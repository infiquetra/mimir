repos:
  - repo: local
    hooks:
      - id: dart-analyze
        name: dart analyze
        entry: flutter analyze
        language: system
        pass_filenames: false
      - id: dart-format
        name: dart format
        entry: dart format
        language: system
        types: [dart]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
