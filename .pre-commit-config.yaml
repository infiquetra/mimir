repos:
  - repo: local
    hooks:
      # This project uses a mixed toolchain intentionally:
      # - dart format is used for consistent code formatting
      # - flutter test is used for running tests in this Flutter package
      # - dart analyze is used for static analysis (faster than flutter analyze)
      - id: dart-analyze
        name: dart analyze
        entry: dart analyze
        language: system
        types: [dart]
        pass_filenames: false
      
      - id: dart-format
        name: dart format
        entry: dart format --output=none --set-exit-if-changed
        language: system
        types: [dart]
      
      - id: flutter-test
        name: flutter test
        entry: flutter test
        language: system
        types: [dart]
        pass_filenames: false
