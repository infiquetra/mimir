name: mimir
description: "Cross-platform EVE Online companion app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Routing
  go_router: ^17.0.0

  # HTTP & Network
  dio: ^5.4.3
  connectivity_plus: ^7.0.0

  # Database
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Auth & Deep Links
  app_links: ^7.0.0
  url_launcher: ^6.2.6

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.9
  fl_chart: ^1.1.0

  # Desktop Multi-Window & System Tray
  desktop_multi_window: ^0.3.0
  tray_manager: ^0.5.2
  window_manager: ^0.5.0

  # Crypto (for PKCE)
  crypto: ^3.0.3

  # Utilities
  intl: ^0.20.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.2.0
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.10.4
  drift_dev: ^2.29.0
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/sde/
    - assets/icons/eve/
    - assets/icons/tray/
